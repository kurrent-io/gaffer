name: Release publish

# Drives the actual publish work that happens after the Version Packages PR
# from `release.yml` merges. Two reasons this lives in its own file:
#   1. `changesets/action`'s `publish:` script runs inline on a single
#      Ubuntu runner. We need cross-OS matrix builds for native binaries,
#      which only a separate workflow can host.
#   2. Manual UI dispatch is occasionally useful for dry-runs or recovery,
#      and `workflow_dispatch` gives that for free.
#
# Triggered by:
#   * `release.yml`'s changesets job (`gh workflow run release-publish.yml`)
#     immediately after the Version Packages PR merges.
#   * Manual UI dispatch (with optional `dry_run: true` for a smoke test).
#
# `deploy-worker-prod`, `deploy-docs-prod`, and
# `publish-vscode-extension` live here too - they share the release
# trigger with the npm publishes. None of them depends on package
# publish success (versions are already bumped on main if publishes
# fail; that's an alarm-and-fix scenario), so they run in parallel.
#
# The VS Code extension publish is a no-op when
# `editors/vscode/package.json`'s version already exists on the
# marketplace (`skipDuplicate: true`). Bump the version manually in
# that file when you want a marketplace release.
#
# Prereqs set out-of-band:
#   * npm trusted publisher configured on npmjs.com for each published
#     package, pointing at this repo + `release-publish.yml`. Thirteen
#     packages total: `@kurrent/gaffer` and `@kurrent/gaffer-runtime`
#     (plus their five `*-<platform>-<arch>` native sub-packages each)
#     and `@kurrent/projections-testing`. Don't add `environment:` to
#     any publish job without reconfiguring trust to match.
#   * Repo-level secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID,
#     OPEN_VSX_TOKEN, VS_MARKETPLACE_TOKEN.
#   * Worker secrets via `wrangler secret put --env production`:
#     POSTHOG_API_KEY.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        type: boolean
        default: false

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-runtime-matrix:
    name: Build runtime (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            rid: linux-x64
            runner: ubuntu-latest
            ext: so
          - platform: linux-arm64
            rid: linux-arm64
            runner: ubuntu-24.04-arm
            ext: so
          - platform: darwin-x64
            rid: osx-x64
            runner: macos-15-intel
            ext: dylib
          - platform: darwin-arm64
            rid: osx-arm64
            runner: macos-15
            ext: dylib
          - platform: win32-x64
            rid: win-x64
            runner: windows-latest
            ext: dll
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "10.x"

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Publish runtime (NativeAOT, ${{ matrix.rid }})
        run: just runtime publish ${{ matrix.rid }}

      - name: Copy binary into native package
        run: just bindings::js-${{ matrix.platform }}::build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runtime-native-${{ matrix.platform }}
          path: bindings/js/native/${{ matrix.platform }}/gaffer.${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  publish-runtime:
    name: Publish @kurrent/gaffer-runtime
    needs: build-runtime-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download runtime native artifacts
        # Each artifact extracts to artifacts/<artifact-name>/ - the
        # upload step uses a single-file path, which upload-artifact
        # strips to just the basename (common-ancestor stripping, stable
        # across action majors), so we can't rely on the directory
        # structure inside the artifact (that's the 0.1.0 publish bug).
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: runtime-native-*
          path: artifacts

      - name: Stage native binaries into packages
        shell: bash
        run: |
          set -euo pipefail
          for platform in linux-x64 linux-arm64; do
            cp "artifacts/runtime-native-${platform}/gaffer.so" "bindings/js/native/${platform}/gaffer.so"
          done
          for platform in darwin-x64 darwin-arm64; do
            cp "artifacts/runtime-native-${platform}/gaffer.dylib" "bindings/js/native/${platform}/gaffer.dylib"
          done
          cp "artifacts/runtime-native-win32-x64/gaffer.dll" "bindings/js/native/win32-x64/gaffer.dll"

      - name: Build wrapper (tsc)
        run: pnpm --filter "@kurrent/gaffer-runtime" build

      - name: Publish runtime packages
        run: |
          pnpm publish -r \
            --filter "@kurrent/gaffer-runtime" \
            --filter "@kurrent/gaffer-runtime-*" \
            --access public --provenance --no-git-checks ${{ inputs.dry_run && '--dry-run' || '' }}

  build-cli-matrix:
    name: Build CLI (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            rid: linux-x64
            runner: ubuntu-latest
            cli-bin: gaffer
          - platform: linux-arm64
            rid: linux-arm64
            runner: ubuntu-24.04-arm
            cli-bin: gaffer
          - platform: darwin-x64
            rid: osx-x64
            runner: macos-15-intel
            cli-bin: gaffer
          - platform: darwin-arm64
            rid: osx-arm64
            runner: macos-15
            cli-bin: gaffer
          - platform: win32-x64
            rid: win-x64
            runner: windows-latest
            cli-bin: gaffer.exe
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "10.x"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
          cache-dependency-path: cli/go.sum

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Publish runtime (NativeAOT, ${{ matrix.rid }})
        run: just runtime publish ${{ matrix.rid }}

      - name: Resolve CLI version
        id: version
        shell: bash
        run: echo "value=$(node -p "require('./cli/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build CLI binary
        # Go's cgo security blocklist rejects `@` in -Wl,-rpath values by
        # default. Allow only the two macOS rpath tokens our binding
        # uses, anchored and with no comma in the optional subpath - a
        # trailing comma would let gcc split off extra `-Wl,` args.
        # Linux $ORIGIN and Windows (no rpath) are already allowed.
        env:
          CGO_LDFLAGS_ALLOW: '^-Wl,-rpath,@(loader_path|executable_path)(/[^,]*)?$'
        run: just cli build-release ${{ steps.version.outputs.value }}

      - name: Stage CLI + runtime into native package
        run: just cli::${{ matrix.platform }}::build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-native-${{ matrix.platform }}
          path: |
            cli/native/${{ matrix.platform }}/${{ matrix.cli-bin }}
            cli/native/${{ matrix.platform }}/Gaffer.Runtime.*
          if-no-files-found: error
          retention-days: 7

  publish-cli:
    name: Publish @kurrent/gaffer
    needs: build-cli-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download CLI native artifacts
        # Each artifact extracts to artifacts/<artifact-name>/ - the
        # upload step's multi-line path is stripped by upload-artifact
        # to the common parent (stable across action majors), so files
        # inside each artifact are flat (gaffer + Gaffer.Runtime.<ext>,
        # no directory).
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cli-native-*
          path: artifacts

      - name: Stage CLI binaries into packages
        shell: bash
        run: |
          set -euo pipefail
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            cp -v "artifacts/cli-native-${platform}"/* "cli/native/${platform}/"
          done

      - name: Publish CLI packages
        # Filter enumerates each CLI cluster package explicitly.
        # `@kurrent/gaffer-*` would also match `@kurrent/gaffer-runtime*`,
        # which the runtime job already publishes.
        run: |
          pnpm publish -r \
            --filter "@kurrent/gaffer" \
            --filter "@kurrent/gaffer-linux-x64" \
            --filter "@kurrent/gaffer-linux-arm64" \
            --filter "@kurrent/gaffer-darwin-x64" \
            --filter "@kurrent/gaffer-darwin-arm64" \
            --filter "@kurrent/gaffer-win32-x64" \
            --access public --provenance --no-git-checks ${{ inputs.dry_run && '--dry-run' || '' }}

  publish-testing:
    name: Publish @kurrent/projections-testing
    # Wait for runtime so the consumer's `npm install` resolves
    # @kurrent/gaffer-runtime - testing's dep on it would otherwise
    # resolve to an unpublished version on a fast-following install.
    needs: publish-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (tsc)
        run: pnpm --filter "@kurrent/projections-testing" build

      - name: Publish
        run: |
          pnpm publish --filter "@kurrent/projections-testing" \
            --access public --provenance --no-git-checks ${{ inputs.dry_run && '--dry-run' || '' }}

  deploy-worker-prod:
    name: Deploy telemetry worker to production
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations
        working-directory: telemetry/worker
        run: pnpm wrangler d1 migrations apply DB --env production --remote

      - name: Build and deploy
        run: just telemetry worker deploy-production

  deploy-docs-prod:
    name: Deploy docs site to production
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build and deploy
        run: just docs deploy-production

  publish-vscode-extension:
    name: Publish VS Code extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build .vsix
        working-directory: editors/vscode
        run: pnpm run package

      # Derive the .vsix path from package.json rather than globbing -
      # `ls | head` fails open when the glob misses, and would silently
      # pass an empty path to the publish steps.
      - name: Resolve .vsix path
        id: vsix
        shell: bash
        run: |
          set -euo pipefail
          name=$(node -p "require('./editors/vscode/package.json').name")
          version=$(node -p "require('./editors/vscode/package.json').version")
          path="editors/vscode/${name}-${version}.vsix"
          if [[ ! -f "$path" ]]; then
            echo "expected .vsix at $path (name=$name, version=$version) but file is missing" >&2
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Upload .vsix artifact (dry-run validation)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gaffer-vscode-extension
          path: ${{ steps.vsix.outputs.path }}
          if-no-files-found: error

      # publish-vscode-extension with `skipDuplicate: true`
      # fails silently when the marketplace already has this version,
      # so re-firing this workflow without a version bump in
      # `editors/vscode/package.json` is a no-op rather than an error.
      - name: Publish to Open VSX
        if: ${{ !inputs.dry_run }}
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # v2.0.0
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ steps.vsix.outputs.path }}
          skipDuplicate: true

      - name: Publish to Visual Studio Marketplace
        if: ${{ !inputs.dry_run }}
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # v2.0.0
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.vsix.outputs.path }}
          skipDuplicate: true
