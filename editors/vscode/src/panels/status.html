<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src 'nonce-{{NONCE}}';"
		/>
		<style>
			body {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100vh;
				box-sizing: border-box;
				margin: 0;
				font-family: var(--vscode-font-family);
				font-size: var(--vscode-font-size, 13px);
				color: var(--vscode-foreground);
				gap: 0.5em;
				padding: 0.6em;
			}
			.title-row {
				display: flex;
				gap: 0.35em;
				align-items: baseline;
				max-width: 100%;
			}
			.title {
				font-size: 1em;
			}
			.title-icon {
				flex: none;
				font-weight: bold;
				color: var(--vscode-errorForeground);
			}
			.title-icon.hidden {
				display: none;
			}
			.stat {
				font-size: 0.92em;
				color: var(--vscode-descriptionForeground);
			}
			.caption {
				font-size: 0.85em;
				color: var(--vscode-descriptionForeground);
				font-style: italic;
				margin-top: 0.3em;
			}
			.error {
				max-width: 100%;
				margin-top: 0.4em;
				font-size: 0.92em;
				color: var(--vscode-errorForeground);
				text-align: center;
				white-space: pre-wrap;
				overflow-wrap: anywhere;
			}
			.error.hidden {
				display: none;
			}
			button {
				margin-top: 0.6em;
				padding: 0.3em 1.2em;
				background: var(--vscode-button-background);
				color: var(--vscode-button-foreground);
				border: none;
				border-radius: 2px;
				cursor: pointer;
				font-size: 0.92em;
			}
			button:hover:not(:disabled) {
				background: var(--vscode-button-hoverBackground);
			}
			button:disabled {
				opacity: 0.6;
				cursor: default;
			}
			button.hidden {
				display: none;
			}
		</style>
	</head>
	<body>
		<div class="title-row">
			<span class="title-icon hidden" id="titleIcon" aria-hidden="true"
				>&#9888;</span
			><span class="title" id="title"></span>
		</div>
		<div class="error hidden" id="error"></div>
		<div id="stats"><div class="stat">Connecting...</div></div>
		<button id="pause" class="hidden">Pause at next event</button>
		<div class="caption" id="caption"></div>
		<script nonce="{{NONCE}}">
			const vscode = acquireVsCodeApi();
			const titleEl = document.getElementById("title");
			const statsEl = document.getElementById("stats");
			const pauseBtn = document.getElementById("pause");
			const captionEl = document.getElementById("caption");
			const errorEl = document.getElementById("error");
			const titleIconEl = document.getElementById("titleIcon");

			pauseBtn.addEventListener("click", () => {
				vscode.postMessage({ command: "pause" });
			});

			window.addEventListener("message", (event) => {
				const msg = event.data;
				if (!msg || msg.type !== "update") return;
				titleEl.textContent = msg.title;
				statsEl.replaceChildren();
				for (const stat of msg.stats) {
					const div = document.createElement("div");
					div.className = "stat";
					div.textContent = stat;
					statsEl.appendChild(div);
				}
				pauseBtn.classList.toggle("hidden", !msg.showPauseButton);
				pauseBtn.textContent = msg.pauseButtonLabel;
				pauseBtn.disabled = msg.pauseButtonDisabled;
				captionEl.textContent =
					msg.mode === "ended" ? "State preserved until next run." : "";
				errorEl.textContent = msg.error ?? "";
				errorEl.classList.toggle("hidden", !msg.error);
				titleIconEl.classList.toggle("hidden", !msg.error);
			});
		</script>
	</body>
</html>
