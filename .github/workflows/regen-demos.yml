name: Regenerate demo recordings

# Manually regenerates the VHS demo recordings under assets/ and opens
# a PR with the updated GIFs. Run from the Actions tab when the CLI
# output a recording depends on has changed.

on:
  workflow_dispatch:

concurrency:
  group: regen-demos
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    name: Regenerate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "10.x"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
          cache-dependency-path: cli/go.sum

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install module dependencies
        run: just init

      - name: Publish runtime
        run: just runtime publish

      - name: Build CLI
        run: just cli build

      - name: Add gaffer CLI to PATH
        run: echo "$GITHUB_WORKSPACE/cli" >> "$GITHUB_PATH"

      # vhs-action@v2's built-in ffmpeg installer is unreliable
      # ("Failed to install ffmpeg", run 26033450846). Install the
      # stack ourselves: ffmpeg from apt, ttyd from its release binary,
      # vhs from go install. ttyd and vhs are pinned (bump by hand) - the
      # job holds contents/pull-requests:write, so a floating release
      # asset would be unverified code execution under that token.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ttyd
        run: |
          # sha256 from the release's SHA256SUMS asset; refresh on version bump.
          curl -fsSL https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64 -o /tmp/ttyd
          echo "8a217c968aba172e0dbf3f34447218dc015bc4d5e59bf51db2f2cd12b7be4f55  /tmp/ttyd" | sha256sum -c -
          chmod +x /tmp/ttyd
          sudo mv /tmp/ttyd /usr/local/bin/ttyd

      # Version is verified by the Go checksum database (sum.golang.org).
      - name: Install VHS
        run: go install github.com/charmbracelet/vhs@v0.11.0

      # Run vhs from the demo/ directory so the recorded shell starts
      # there. Avoids a visible `cd demo` step in the recording (Hide
      # / Show in the tape file didn't suppress the prompt + command).
      - name: Regenerate demo recordings
        working-directory: demo
        run: |
          for tape in ../tools/vhs/*.tape; do
            echo "Recording $tape"
            vhs "$tape"
          done

      - name: Open PR with updated recordings
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: Regenerate demo recordings
          title: Regenerate demo recordings
          body: |
            Regenerated demo recordings (under `assets/` and `docs/public/`)
            via the
            [Regenerate demo recordings](https://github.com/${{ github.repository }}/actions/workflows/regen-demos.yml)
            workflow.

            Review the rendered GIFs (not the binary diffs) before merging.
          branch: regen-demos
          add-paths: |
            assets/*.gif
            docs/public/*.gif
          labels: documentation
