packages:
  - 'bindings/js'
  - 'bindings/js/native/*'
  - 'cli'
  - 'cli/native/*'
  - 'testing/js'
  - 'editors/vscode'
  - 'editors/vscode/tsserver-plugin'
  - 'telemetry'
  - 'telemetry/worker'
  - 'types'

allowBuilds:
  koffi: true
  esbuild: true
  '@vscode/vsce-sign': true
  keytar: true
  protobufjs: true
  sharp: true
  workerd: true

overrides:
  "ws@>=8.0.0 <8.20.1": ">=8.20.1"
