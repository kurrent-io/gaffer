name: Release

# Release flow:
#   * changesets - opens or updates the "Version Packages" PR while
#     changesets are present. When that PR merges and no changesets
#     remain, the action runs its `publish:` command, which dispatches
#     `release-publish.yml` (the multi-OS matrix can't fit in
#     changesets/action's single-runner `publish:` slot).
#   * detect-changes - paths-filter gate. Lives in its own job so the
#     deploy-*-staging checks skip cleanly when nothing relevant
#     changed (top-level workflow `paths:` would also gate the changesets
#     job, which has to react to every main push).
#   * deploy-worker-staging - redeploys the telemetry worker to staging
#     when the gate reports worker-relevant changes.
#   * deploy-docs-staging - redeploys the docs site to staging when the
#     gate reports docs-relevant changes.
#
# Production deploys live in `release-publish.yml` alongside the package
# publish jobs - they fire from the same trigger, so co-locating keeps
# the "what happens at release time" surface in one file.
#
# Manual prod deploys aren't exposed here. If a hotfix is needed before
# the next release, run `just telemetry worker deploy-production`
# (CLOUDFLARE_API_TOKEN env) or `just docs deploy-production`
# (interactive `wrangler login`) locally.
#
# Prereqs set out-of-band:
#   * Repo-level secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
#   * Worker secrets via `wrangler secret put --env <env>`: POSTHOG_API_KEY.
#   * npm trusted publishing - see `release-publish.yml` for details.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changesets:
    name: Version Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      actions: write   # to dispatch release-publish.yml from publish:
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - uses: changesets/action@v1
        id: changesets
        with:
          version: pnpm bump-versions
          # Runs only when no pending changesets remain - the moment
          # right after the Version Packages PR merges. Dispatches
          # release-publish.yml; package publish + worker prod deploy
          # happen there.
          publish: gh workflow run release-publish.yml -f dry_run=false
          commit: "chore(release): version packages"
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      worker: ${{ steps.changes.outputs.worker }}
      docs: ${{ steps.changes.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            worker:
              - 'telemetry/worker/**'
              - 'telemetry/generated/**'
              - 'telemetry/schemas/**'
              - '.github/workflows/release.yml'
            docs:
              - 'docs/**'
              - 'assets/**'
              - '.github/workflows/release.yml'

  deploy-worker-staging:
    name: Deploy telemetry worker to staging
    needs: detect-changes
    if: needs.detect-changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: extractions/setup-just@v4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations
        working-directory: telemetry/worker
        run: pnpm wrangler d1 migrations apply DB --env staging --remote

      - name: Build and deploy
        run: just telemetry worker deploy-staging

  deploy-docs-staging:
    name: Deploy docs site to staging
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: extractions/setup-just@v4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build and deploy
        run: just docs deploy-staging
