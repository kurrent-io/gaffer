name: Devcontainer prebuild

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer-prebuild.yml"
  schedule:
    # Mondays 04:00 UTC - rebuilds against base-image and apt updates.
    # Toolchain versions are pinned in the Dockerfile and bumped via PR.
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push
    if: github.repository == 'kurrent-io/gaffer'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prebuild devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/kurrent-io/gaffer-devcontainer
          imageTag: latest,${{ github.sha }}
          platform: linux/amd64,linux/arm64
          push: always
          cacheFrom: ghcr.io/kurrent-io/gaffer-devcontainer:latest
