name: Release

# Release flow:
#   * changesets - opens or updates the "Version Packages" PR while
#     changesets are present, then runs the publish script when that PR
#     merges and consumes them. The action reports `published` and
#     `publishedPackages` for downstream jobs.
#   * detect-changes - paths-filter gate. Lives in its own job so the
#     deploy-worker-staging check skips cleanly when nothing relevant
#     changed (top-level workflow `paths:` would also gate the changesets
#     job, which has to react to every main push).
#   * deploy-worker-staging - redeploys the worker to staging when the
#     gate reports worker-relevant changes.
#   * deploy-worker-prod - redeploys the worker to production on every
#     publish run, regardless of whether worker files changed. The worker
#     isn't a published npm package so it doesn't appear in
#     `publishedPackages`; the coarse trigger is fine because the deploy
#     is idempotent and fast.
#
# Manual prod deploys aren't exposed here. If a hotfix is needed before
# the next release, run `just telemetry worker deploy-production` locally
# with CLOUDFLARE_API_TOKEN set.
#
# Per-package publish jobs (CLI, runtime, testing, VS Code) are owned by
# their tickets (UI-1530, UI-1532, UI-1536, UI-1537). They wire into the
# `publish:` script below (one `changeset publish` covers npm-published
# ones) or add their own `needs: changesets` job inspecting
# `publishedPackages`.
#
# Prereqs set out-of-band:
#   * Repo-level secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
#   * Worker secrets via `wrangler secret put --env <env>`: POSTHOG_API_KEY.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changesets:
    name: Version Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - uses: changesets/action@v1
        id: changesets
        with:
          version: pnpm bump-versions
          publish: 'echo "publish script: filled in by UI-1530 / UI-1532 / UI-1536 / UI-1537"'
          commit: "chore(release): version packages"
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      worker: ${{ steps.changes.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            worker:
              - 'telemetry/worker/**'
              - 'telemetry/generated/**'
              - 'telemetry/schemas/**'
              - '.github/workflows/release.yml'

  deploy-worker-staging:
    name: Deploy telemetry worker to staging
    needs: detect-changes
    if: needs.detect-changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build worker bundle
        run: pnpm --filter "@kurrent/gaffer-telemetry-worker" run build

      - name: Apply D1 migrations
        working-directory: telemetry/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler d1 migrations apply DB --env staging --remote

      - name: Deploy
        working-directory: telemetry/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler deploy --env staging

  deploy-worker-prod:
    name: Deploy telemetry worker to production
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build worker bundle
        run: pnpm --filter "@kurrent/gaffer-telemetry-worker" run build

      - name: Apply D1 migrations
        working-directory: telemetry/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler d1 migrations apply DB --env production --remote

      - name: Deploy
        working-directory: telemetry/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler deploy --env production
