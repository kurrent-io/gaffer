services:
  kurrentdb:
    image: docker.kurrent.io/kurrent-latest/kurrentdb:26.1.0
    ports:
      - "2113:2113"
    environment:
      - KURRENTDB_CLUSTER_SIZE=1
      - KURRENTDB_INSECURE=true
      - KURRENTDB_RUN_PROJECTIONS=All
      - KURRENTDB_START_STANDARD_PROJECTIONS=true
      - KURRENTDB_MEM_DB=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2113/gossip || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
