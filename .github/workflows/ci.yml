name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Toolchain pins agree
        run: tools/check-toolchain-pins.sh

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.work
          cache-dependency-path: cli/go.sum

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: 1.52.0

      - name: Install module dependencies
        run: just init

      - name: Check formatting and linting
        run: just check

      - name: Telemetry codegen determinism
        run: just telemetry test

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.work
          cache-dependency-path: cli/go.sum

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: 1.52.0

      - name: Install module dependencies
        run: just init

      - name: Telemetry worker tests
        run: just telemetry worker test

      # Publish gaffer.so once. The public build/test/test-integration
      # targets each depend on _runtime; calling them sequentially would
      # let dotnet's incremental build skip work but still run noise. By
      # publishing once and then invoking the underscore-prefixed
      # orchestration recipes directly we avoid the redundancy.
      - name: Publish runtime (NativeAOT)
        run: just runtime publish

      - name: Build other modules
        run: just _build

      - name: Unit tests
        run: just _test

      - name: Start KurrentDB
        run: just db-up

      - name: Integration tests
        run: just _test-integration

      - name: KurrentDB logs
        if: failure()
        run: docker compose -f tools/kurrentdb/docker-compose.yml logs

      - name: Stop KurrentDB
        if: always()
        run: just db-down
