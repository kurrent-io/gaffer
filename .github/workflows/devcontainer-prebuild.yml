name: Devcontainer prebuild

on:
  pull_request:
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer-prebuild.yml"
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer-prebuild.yml"
  schedule:
    # Mondays 04:00 UTC - picks up base-image and feature-installer updates
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prebuild devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/kurrent-io/gaffer-devcontainer
          imageTag: latest,${{ github.sha }}
          platform: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'pull_request' && 'never' || 'always' }}
          cacheFrom: ghcr.io/kurrent-io/gaffer-devcontainer:latest
