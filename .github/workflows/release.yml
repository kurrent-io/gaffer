name: Release

# On push to main: changesets/action opens (or updates) a "Version
# Packages" PR aggregating every pending changeset. Merging that PR
# bumps versions, regenerates per-package CHANGELOG.md, and lets the
# publish jobs below take over.
#
# The publish jobs are stubs. Each is owned by a separate ticket:
# UI-1530 (CLI), UI-1532 (VS Code), UI-1536 (runtime), UI-1537
# (testing). They reshape their own triggers / steps as needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changesets:
    name: Version Packages
    # Only run from push-to-main; workflow_dispatch is for the stub
    # publish jobs below. A manual dispatch from a non-main ref would
    # otherwise let the action open a Version Packages PR off unmerged
    # branch state.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - uses: changesets/action@v1
        with:
          version: pnpm bump-versions
          publish: echo "publish step is filled in by UI-1530 / UI-1532 / UI-1536 / UI-1537"
          commit: "chore(release): version packages"
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-cli:
    name: Publish @kurrent/gaffer (CLI)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Stub. Filled in by UI-1530."

  publish-runtime:
    name: Publish @kurrent/gaffer-runtime
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Stub. Filled in by UI-1536."

  publish-testing:
    name: Publish @kurrent/projections-testing
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Stub. Filled in by UI-1537."

  publish-vscode:
    name: Publish VS Code extension
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Stub. Filled in by UI-1532."

  # Telemetry worker prod deploy. Triggers on the Version Packages PR
  # merge, detected by the commit subject configured for changesets/action
  # above AND the commit author being the github-actions bot so a direct
  # push-to-main with a matching subject can't spoof a prod deploy.
  # Assumes the Version Packages PR is squash-merged (the squash commit
  # preserves the bot as author). Staging deploys happen continuously
  # from deploy-worker.yml on every main push; this job promotes whatever
  # is on main to prod when the release lands. Worker-only fixes that
  # need prod faster than the next release can use the
  # `workflow_dispatch` escape hatch in deploy-worker.yml.
  publish-worker:
    name: Deploy telemetry worker to production
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.event.head_commit.author.username == 'github-actions[bot]' &&
      startsWith(github.event.head_commit.message, 'chore(release): version packages')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build worker bundle
        run: pnpm --filter "@kurrent/gaffer-telemetry-worker" run build
      - name: Apply D1 migrations
        working-directory: telemetry/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler d1 migrations apply DB --env production --remote
      - name: Deploy
        working-directory: telemetry/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler deploy --env production
