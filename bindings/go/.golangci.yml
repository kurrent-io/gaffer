version: "2"

linters:
  enable:
    - revive
    - forbidigo
    - errorlint
    - forcetypeassert
    - errchkjson
    - intrange
    - modernize
    - bodyclose
    - nilerr
    - perfsprint
    - usetesting
    - unconvert
    - copyloopvar
    - misspell

  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-keys-type
        - name: error-return
        - name: range
        - name: time-naming
        - name: errorf
        - name: empty-block
        - name: unreachable-code
        - name: unexported-return
        - name: use-any

    forbidigo:
      forbid:
        - pattern: '^(fmt\.Print(|f|ln)|print|println)$'
          msg: Do not commit print statements.
        - pattern: '^sort\.(Strings|Ints|Float64s|Slice|SliceStable)$'
          msg: Use slices.Sort / slices.SortFunc (go 1.21+), not sort.*

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

formatters:
  enable:
    - goimports
    - gofumpt
  settings:
    golines:
      max-len: 120
