name: Regenerate demo recordings

# Manually regenerates the VHS demo recordings under assets/ and opens
# a PR with the updated GIFs. Run from the Actions tab when the CLI
# output a recording depends on has changed.

on:
  workflow_dispatch:

concurrency:
  group: regen-demos
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    name: Regenerate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: cli/go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: extractions/setup-just@v4

      - name: Install module dependencies
        run: just init

      - name: Publish runtime
        run: just runtime publish

      - name: Build CLI
        run: just cli build

      - name: Add gaffer CLI to PATH
        run: echo "$GITHUB_WORKSPACE/cli" >> "$GITHUB_PATH"

      # vhs-action@v2's built-in ffmpeg installer is unreliable
      # ("Failed to install ffmpeg", run 26033450846). Install the
      # stack ourselves: ffmpeg from apt, ttyd from its release binary,
      # vhs from go install.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ttyd
        run: |
          curl -fsSL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 -o /tmp/ttyd
          chmod +x /tmp/ttyd
          sudo mv /tmp/ttyd /usr/local/bin/ttyd

      - name: Install VHS
        run: go install github.com/charmbracelet/vhs@latest

      # Run vhs from the demo/ directory so the recorded shell starts
      # there. Avoids a visible `cd demo` step in the recording (Hide
      # / Show in the tape file didn't suppress the prompt + command).
      - name: Regenerate demo recordings
        working-directory: demo
        run: vhs ../tools/vhs/demo-dev.tape

      - name: Open PR with updated recordings
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Regenerate demo recordings
          title: Regenerate demo recordings
          body: |
            Regenerated demo recordings under `assets/` via the
            [Regenerate demo recordings](https://github.com/${{ github.repository }}/actions/workflows/regen-demos.yml)
            workflow.

            Review the rendered GIFs (not the binary diffs) before merging.
          branch: regen-demos
          add-paths: assets/*.gif
          labels: documentation
