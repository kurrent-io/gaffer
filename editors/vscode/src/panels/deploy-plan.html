<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src 'nonce-{{NONCE}}';"
		/>
		<style>
			body {
				margin: 0;
				padding: 1.2em 1.4em;
				font-family: var(--vscode-font-family);
				font-size: var(--vscode-font-size, 13px);
				color: var(--vscode-foreground);
			}
			.header {
				display: flex;
				justify-content: space-between;
				align-items: baseline;
				gap: 0.5em 1em;
				padding-bottom: 0.8em;
				border-bottom: 1px solid var(--vscode-panel-border);
			}
			.header-left {
				display: flex;
				align-items: baseline;
				gap: 0.45em;
				min-width: 0;
			}
			.env {
				font-size: 1.2em;
				font-weight: 600;
				overflow-wrap: anywhere;
			}
			.prod {
				padding: 0.05em 0.55em;
				border-radius: 0.9em;
				font-size: 0.72em;
				font-weight: 700;
				letter-spacing: 0.05em;
				text-transform: uppercase;
				white-space: nowrap;
				color: var(
					--vscode-editorWarning-foreground,
					var(--vscode-charts-orange)
				);
				border: 1px solid
					var(--vscode-editorWarning-foreground, var(--vscode-charts-orange));
			}
			.env-key {
				color: var(--vscode-descriptionForeground);
				font-family: var(--vscode-editor-font-family, monospace);
				font-size: 0.9em;
				white-space: nowrap;
			}
			.footer {
				margin-top: 1.1em;
				padding-top: 0.8em;
				border-top: 1px solid var(--vscode-panel-border);
			}
			.footer-note {
				margin-bottom: 0.7em;
			}
			.footer-note:empty {
				display: none;
			}
			.footer-bar {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				justify-content: space-between;
				gap: 0.8em;
			}
			.footer-message {
				display: flex;
				flex-direction: column;
				gap: 0.5em;
			}
			.footer-message:empty {
				display: none;
			}
			.done-headline {
				font-weight: 600;
			}
			.done-headline.ok {
				color: var(--vscode-charts-green, var(--vscode-testing-iconPassed));
			}
			.done-headline.fail {
				color: var(--vscode-errorForeground);
			}
			.hint-text {
				color: var(--vscode-descriptionForeground);
			}
			.seg {
				font-weight: 600;
			}
			.sep {
				color: var(--vscode-descriptionForeground);
			}
			.drift {
				margin: 0.6em 0;
				padding: 0.5em 0.7em;
				border-left: 3px solid var(--vscode-inputValidation-warningBorder);
				background: var(--vscode-inputValidation-warningBackground);
				white-space: pre-wrap;
				overflow-wrap: anywhere;
				border-radius: 2px;
			}
			.alert {
				padding: 0.5em 0.7em;
				border-left: 3px solid
					var(
						--vscode-inputValidation-errorBorder,
						var(--vscode-errorForeground)
					);
				background: var(
					--vscode-inputValidation-errorBackground,
					rgba(244, 135, 113, 0.15)
				);
				overflow-wrap: anywhere;
				border-radius: 2px;
			}
			ul.plan {
				list-style: none;
				margin: 0.4em 0 0;
				padding: 0;
			}
			li.row {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 0.5em;
				padding: 0.4em 0.4em;
			}
			.row-action {
				margin-left: auto;
				background: var(--vscode-button-secondaryBackground);
				color: var(--vscode-button-secondaryForeground);
				border: 1px solid var(--vscode-button-border, transparent);
				border-radius: 2px;
				padding: 0.2em 0.7em;
				font-size: 0.85em;
				font-family: inherit;
				cursor: pointer;
			}
			.row-action:hover {
				background: var(--vscode-button-secondaryHoverBackground);
			}
			li.row.unchanged {
				opacity: 0.55;
			}
			.name {
				font-weight: 600;
				flex: 0 0 var(--name-col, 8em);
			}
			.outcome {
				font-size: 0.82em;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.03em;
			}
			.o-created {
				color: var(
					--vscode-gitDecoration-addedResourceForeground,
					var(--vscode-charts-green)
				);
			}
			.o-updated {
				color: var(--vscode-charts-blue, var(--vscode-textLink-foreground));
			}
			.o-rebuilt,
			.o-refused {
				color: var(
					--vscode-editorWarning-foreground,
					var(--vscode-charts-orange)
				);
			}
			.o-skipped {
				color: var(--vscode-descriptionForeground);
			}
			.o-invalid,
			.o-failed {
				color: var(--vscode-errorForeground);
			}
			.tag {
				padding: 0.05em 0.45em;
				border-radius: 0.8em;
				font-size: 0.78em;
				background: var(--vscode-badge-background);
				color: var(--vscode-badge-foreground);
			}
			.tag.warn {
				background: var(--vscode-inputValidation-warningBackground);
				color: var(--vscode-foreground);
			}
			.detail {
				flex-basis: 100%;
				margin-left: 0.4em;
				color: var(--vscode-descriptionForeground);
				font-size: 0.9em;
				white-space: pre-wrap;
				overflow-wrap: anywhere;
			}
			.detail.code {
				font-family: var(--vscode-editor-font-family, monospace);
				white-space: pre;
				overflow-x: auto;
				margin: 0.4em 0.4em 0.5em;
				padding: 0.7em 0.9em;
				background: var(
					--vscode-textCodeBlock-background,
					rgba(127, 127, 127, 0.1)
				);
				border-radius: 4px;
			}
			.empty {
				margin-top: 1em;
				color: var(--vscode-descriptionForeground);
				font-style: italic;
			}
			.actions {
				display: flex;
				align-items: center;
				gap: 0.6em;
			}
			.bypass {
				display: flex;
				align-items: center;
				gap: 0.4em;
				color: var(--vscode-descriptionForeground);
				font-size: 0.9em;
			}
			button.primary,
			button.secondary {
				border: 1px solid var(--vscode-button-border, transparent);
				border-radius: 2px;
				padding: 0.35em 1.1em;
				font-size: inherit;
				font-family: inherit;
				line-height: 1.4;
				cursor: pointer;
			}
			button.primary {
				background: var(--vscode-button-background);
				color: var(--vscode-button-foreground);
			}
			button.primary:hover:not(:disabled) {
				background: var(--vscode-button-hoverBackground);
			}
			button.primary:disabled {
				opacity: 0.5;
				cursor: default;
			}
			button.secondary {
				background: var(--vscode-button-secondaryBackground);
				color: var(--vscode-button-secondaryForeground);
			}
			button.secondary:hover {
				background: var(--vscode-button-secondaryHoverBackground);
			}
			.o-applying {
				color: var(--vscode-descriptionForeground);
			}
		</style>
	</head>
	<body>
		<div class="header" id="header"></div>
		<div id="drift"></div>
		<ul class="plan" id="plan"></ul>
		<div class="footer">
			<div id="footer-note" class="footer-note"></div>
			<div id="footer-bar" class="footer-bar">
				<div id="summary" class="summary"></div>
				<div id="actions" class="actions"></div>
			</div>
			<div id="footer-message" class="footer-message"></div>
		</div>
		<script nonce="{{NONCE}}">
			const vscode = acquireVsCodeApi();
			const headerEl = document.getElementById("header");
			const summaryEl = document.getElementById("summary");
			const driftEl = document.getElementById("drift");
			const planEl = document.getElementById("plan");
			const actionsEl = document.getElementById("actions");
			const footerNoteEl = document.getElementById("footer-note");
			const footerBarEl = document.getElementById("footer-bar");
			const footerMessageEl = document.getElementById("footer-message");

			// The footer has two modes: the plan bar (summary + Deploy/Cancel) while
			// reviewing, and a single message once an apply starts.
			function enterMessageMode() {
				footerNoteEl.replaceChildren();
				footerBarEl.style.display = "none";
			}
			function enterPlanMode() {
				footerBarEl.style.display = "";
				footerMessageEl.replaceChildren();
			}

			// name -> row <li>, rebuilt each render so the streaming apply can update
			// a projection's row in place.
			let rowEls = new Map();

			// The token of the plan currently rendered, sent with a Deploy click so
			// the host can drop it if the panel has since re-rendered to another plan.
			let currentToken = 0;

			// This is a plan, so show what a deploy WOULD do, not the past-tense
			// result words the shared JSON outcome carries (created/updated/...).
			const PLAN_LABEL = {
				created: "create",
				updated: "update",
				rebuilt: "rebuild",
				skipped: "unchanged",
				refused: "recreate",
				invalid: "invalid",
				failed: "error",
			};

			function span(cls, text) {
				const el = document.createElement("span");
				el.className = cls;
				el.textContent = text;
				return el;
			}

			function block(cls, text) {
				const el = document.createElement("div");
				el.className = cls;
				el.textContent = text;
				return el;
			}

			function renderHeader(report) {
				headerEl.replaceChildren();
				const left = block("header-left", "");
				left.appendChild(
					span("env", report.target || report.env || "environment"),
				);
				if (report.production) {
					left.appendChild(span("prod", "production"));
				}
				headerEl.appendChild(left);
				if (report.env) {
					headerEl.appendChild(span("env-key", "env." + report.env));
				}
			}

			// Per-action breakdown, mirroring the CLI plan roll-up: one segment per
			// non-zero outcome, in plan-action order, each in its severity colour.
			const SUMMARY_SEGS = [
				["created", "to create"],
				["updated", "to update"],
				["rebuilt", "to rebuild"],
				["refused", "to recreate"],
				["skipped", "unchanged"],
				["invalid", "invalid"],
				["failed", "failed"],
			];

			function renderSummary(report) {
				summaryEl.replaceChildren();
				const counts = {};
				for (const i of report.plan || [])
					counts[i.outcome] = (counts[i.outcome] || 0) + 1;
				const parts = [];
				for (const [outcome, label] of SUMMARY_SEGS) {
					if (counts[outcome]) {
						parts.push(span("seg o-" + outcome, counts[outcome] + " " + label));
					}
				}
				if (parts.length === 0) {
					summaryEl.textContent = "No projections configured.";
					return;
				}
				parts.forEach((part, i) => {
					if (i > 0) summaryEl.appendChild(span("sep", " · "));
					summaryEl.appendChild(part);
				});
			}

			function renderDrift(report) {
				driftEl.replaceChildren();
				if (report.configDriftError) {
					driftEl.appendChild(
						block(
							"drift",
							"[database_config] check couldn't run: " +
								report.configDriftError,
						),
					);
					return;
				}
				const drift = report.configDrift || [];
				if (drift.length === 0) return;
				const lines = drift.map(
					(d) => d.knob + ": server " + d.server + ", local " + d.local,
				);
				driftEl.appendChild(
					block(
						"drift",
						"[database_config] diverges from the target:\n" + lines.join("\n"),
					),
				);
			}

			// recreate isn't listed here: it's carried by the "recreate" outcome
			// itself (a refused item is always a recreate-required one).
			const TAGS = [
				["faulted", "faulted"],
				["emittingReset", "re-emits"],
				["logicChange", "logic change"],
			];

			// The explicit per-row action, keyed by outcome. An update can be diffed
			// against what's deployed; create/unchanged have nothing to act on.
			const ROW_ACTION = {
				updated: { command: "diff", label: "Diff" },
			};

			function renderRow(item) {
				const li = document.createElement("li");
				li.className = item.outcome === "skipped" ? "row unchanged" : "row";
				li.dataset.name = item.name;
				li.appendChild(span("name", item.name));
				li.appendChild(
					span(
						"outcome o-" + item.outcome,
						PLAN_LABEL[item.outcome] || item.outcome,
					),
				);
				for (const [key, text] of TAGS) {
					if (item[key]) li.appendChild(span("tag warn", text));
				}
				if (item.externalChange) {
					const t = item.externalChangeTool
						? "changed by " + item.externalChangeTool
						: "changed externally";
					li.appendChild(span("tag warn", t));
				}
				const action = ROW_ACTION[item.outcome];
				if (action) {
					const btn = document.createElement("button");
					btn.className = "row-action";
					btn.textContent = action.label;
					btn.addEventListener("click", () => {
						vscode.postMessage({ command: action.command, name: item.name });
					});
					li.appendChild(btn);
				}
				// invalid/failed carry a code diagnostic (compile error, frame) that
				// needs a monospace font to line up; a refusal's reason is prose.
				const detail = item.error || item.reason;
				if (detail) {
					const code = item.outcome === "invalid" || item.outcome === "failed";
					li.appendChild(span(code ? "detail code" : "detail", detail));
				}
				return li;
			}

			function render(report) {
				enterPlanMode();
				renderHeader(report);
				renderSummary(report);
				renderDrift(report);
				planEl.replaceChildren();
				rowEls = new Map();
				const items = report.plan || [];
				// Size the name column to the longest name so the outcomes align.
				const maxName = items.reduce(
					(m, i) => Math.max(m, (i.name || "").length),
					0,
				);
				planEl.style.setProperty("--name-col", maxName + 2 + "ch");
				if (items.length === 0) {
					const li = document.createElement("li");
					li.appendChild(span("empty", "No projections configured."));
					planEl.appendChild(li);
					actionsEl.replaceChildren();
					footerNoteEl.replaceChildren();
					return;
				}
				for (const item of items) {
					const li = renderRow(item);
					rowEls.set(item.name, li);
					planEl.appendChild(li);
				}
				renderActions(report);
			}

			function button(cls, label, onClick) {
				const b = document.createElement("button");
				b.className = cls;
				b.textContent = label;
				b.addEventListener("click", onClick);
				return b;
			}

			function cancelButton(label) {
				return button("secondary", label, () =>
					vscode.postMessage({ command: "cancel" }),
				);
			}

			function deployButton(noValidate) {
				const btn = button("primary", "Deploy", () => {
					// Disable on click so a rapid double-click can't post twice before
					// the host switches the footer to progress; carry the plan token so
					// a stale click (panel re-rendered since) is dropped host-side.
					btn.disabled = true;
					vscode.postMessage({
						command: "deploy",
						noValidate,
						token: currentToken,
					});
				});
				return btn;
			}

			// The footer's Deploy / Cancel controls (right of the bar), gated on the
			// plan's verdict. The bypass checkbox or prod note goes in footerNoteEl,
			// its own line above the bar.
			function renderActions(report) {
				actionsEl.replaceChildren();
				footerNoteEl.replaceChildren();
				if ((report.plan || []).length === 0) return;
				const verdict = report.verdict || "";

				if (verdict === "in-sync") {
					actionsEl.appendChild(cancelButton("Close"));
					return;
				}

				if (verdict === "blocked") {
					if (report.production) {
						// --no-validate is refused on production, so the invalid
						// projections can't be skipped. Show Deploy disabled with a
						// visible reason (and a title) rather than dropping it - a lone
						// Cancel reads as broken.
						const reason =
							"This is a production database, so invalid projections can't be skipped. Fix them to deploy.";
						footerNoteEl.appendChild(block("alert", reason));
						const deployBtn = deployButton(false);
						deployBtn.disabled = true;
						deployBtn.title = reason;
						actionsEl.append(cancelButton("Cancel"), deployBtn);
						return;
					}
					const deployBtn = deployButton(true);
					deployBtn.disabled = true;
					const check = document.createElement("input");
					check.type = "checkbox";
					check.id = "bypass";
					check.addEventListener("change", () => {
						deployBtn.disabled = !check.checked;
					});
					const label = document.createElement("label");
					label.className = "bypass";
					label.htmlFor = "bypass";
					label.append(
						check,
						document.createTextNode(
							"Deploy the valid projections, skip the rest",
						),
					);
					footerNoteEl.appendChild(label);
					actionsEl.append(cancelButton("Cancel"), deployBtn);
					return;
				}

				// deployable
				actionsEl.append(cancelButton("Cancel"), deployButton(false));
			}

			// Set a projection row's outcome cell (during the streaming apply).
			function setRowOutcome(name, outcome, text) {
				const li = rowEls.get(name);
				if (!li) return;
				li.classList.remove("unchanged");
				const outEl = li.querySelector(".outcome");
				if (outEl) {
					outEl.className = "outcome o-" + outcome;
					outEl.textContent = text;
				}
			}

			function setRowDetail(name, detail, code) {
				const li = rowEls.get(name);
				if (!li) return;
				const existing = li.querySelector(".detail");
				if (existing) existing.remove();
				if (detail)
					li.appendChild(span(code ? "detail code" : "detail", detail));
			}

			function onDeployItem(msg) {
				setRowOutcome(msg.name, msg.outcome, msg.outcome);
				const code = msg.outcome === "invalid" || msg.outcome === "failed";
				setRowDetail(msg.name, msg.detail, code);
			}

			// Past-tense result breakdown for the completion message, from the
			// deploy_summary counts.
			const RESULT_SEGS = [
				["created", "created"],
				["updated", "updated"],
				["rebuilt", "rebuilt"],
				["skipped", "unchanged"],
				["refused", "refused"],
				["invalid", "invalid"],
				["failed", "failed"],
			];

			// A "you can close this window" line with a right-aligned Close button,
			// reusing the footer bar's space-between layout.
			function closeRow() {
				const row = block("footer-bar", "");
				row.append(
					span("hint-text", "You can close this window."),
					cancelButton("Close"),
				);
				return row;
			}

			function onDeployDone(summary) {
				enterMessageMode();
				const failed = summary.failed || 0;
				// A blocked plan deployed with the bypass skips its invalid/refused
				// projections - deployed, but not "successfully" (those didn't apply).
				const skipped = (summary.invalid || 0) + (summary.refused || 0);
				let headline, cls;
				if (failed > 0) {
					headline = `Deployed with ${failed} failed`;
					cls = "fail";
				} else if (skipped > 0) {
					headline = "Deployed the valid projections";
					cls = "ok";
				} else {
					headline = "Successfully deployed";
					cls = "ok";
				}
				// Headline + past-tense breakdown on one line, each in its colour.
				const line = block("done-line", "");
				line.appendChild(span("done-headline " + cls, headline));
				for (const [key, label] of RESULT_SEGS) {
					if (summary[key]) {
						line.append(
							span("sep", " · "),
							span("seg o-" + key, summary[key] + " " + label),
						);
					}
				}
				footerMessageEl.replaceChildren(line, closeRow());
			}

			function onDeployError(message) {
				enterMessageMode();
				// The apply died mid-flight; any row left spinning at "applying…"
				// never settled, so clear it rather than imply work is still running.
				for (const li of rowEls.values()) {
					const outEl = li.querySelector(".outcome.o-applying");
					if (outEl) {
						outEl.className = "outcome o-skipped";
						outEl.textContent = "—";
					}
				}
				footerMessageEl.replaceChildren(
					span("done-headline fail", message),
					closeRow(),
				);
			}

			window.addEventListener("message", (event) => {
				const msg = event.data;
				if (!msg) return;
				switch (msg.type) {
					case "plan":
						if (msg.report) {
							currentToken = msg.token;
							render(msg.report);
						}
						break;
					case "deploy-started":
						enterMessageMode();
						footerMessageEl.replaceChildren(span("hint-text", "Deploying…"));
						break;
					case "deploy-active":
						setRowOutcome(msg.name, "applying", "applying…");
						break;
					case "deploy-item":
						onDeployItem(msg);
						break;
					case "deploy-done":
						onDeployDone(msg.summary);
						break;
					case "deploy-error":
						onDeployError(msg.message);
						break;
				}
			});
		</script>
	</body>
</html>
