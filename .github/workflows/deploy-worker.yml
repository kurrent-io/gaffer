name: Deploy worker

# Worker deploy flow:
#   * PR touching the worker -> dry-run (build + wrangler --dry-run, no
#     upload). Validates the change at least compiles to a deployable
#     bundle.
#   * Push to main touching the worker -> apply D1 migrations + deploy
#     to staging.
#   * workflow_dispatch -> manual deploy to either env (escape hatch for
#     emergency prod deploys or for re-running a deploy).
#
# Prod is NOT deployed from this workflow on push-to-main. It's deployed
# from release.yml's publish-worker job on Version Packages PR merge.
# The `workflow_dispatch` path below offers production as an escape hatch
# for worker-only fixes that need prod faster than the next release.
#
# Prereqs set out-of-band (one-time):
#   * Repo-level secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
#   * Worker secrets via `wrangler secret put --env <env>`: POSTHOG_API_KEY.
#     These persist across deploys; CI never touches them.

on:
  pull_request:
    paths:
      - "telemetry/worker/**"
      - "telemetry/generated/**"
      - "telemetry/schemas/**"
      - ".github/workflows/deploy-worker.yml"
  push:
    branches: [main]
    paths:
      - "telemetry/worker/**"
      - "telemetry/generated/**"
      - "telemetry/schemas/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        type: choice
        options: [staging, production]
        required: true

concurrency:
  # Per-target so a staging deploy doesn't block prod and vice versa.
  # Don't cancel an in-flight deploy: a half-applied D1 migration is worse
  # than a queued one.
  group: deploy-worker-${{ inputs.environment || (github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number)) || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  worker:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build worker bundle
        run: pnpm --filter "@kurrent/gaffer-telemetry-worker" run build

      - name: Resolve target
        id: target
        # Maps event -> (wrangler env, dry-run vs real). PRs dry-run against
        # staging config; push-to-main deploys staging; dispatch picks env.
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              echo "env=staging" >> $GITHUB_OUTPUT
              echo "dry_run=true" >> $GITHUB_OUTPUT
              ;;
            push)
              echo "env=staging" >> $GITHUB_OUTPUT
              echo "dry_run=false" >> $GITHUB_OUTPUT
              ;;
            workflow_dispatch)
              echo "env=${{ inputs.environment }}" >> $GITHUB_OUTPUT
              echo "dry_run=false" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Dry-run deploy
        if: steps.target.outputs.dry_run == 'true'
        working-directory: telemetry/worker
        run: pnpm wrangler deploy --env ${{ steps.target.outputs.env }} --dry-run --outdir=/tmp/wrangler-dryrun

      - name: Apply D1 migrations
        if: steps.target.outputs.dry_run == 'false'
        working-directory: telemetry/worker
        run: pnpm wrangler d1 migrations apply DB --env ${{ steps.target.outputs.env }} --remote

      - name: Deploy
        if: steps.target.outputs.dry_run == 'false'
        working-directory: telemetry/worker
        run: pnpm wrangler deploy --env ${{ steps.target.outputs.env }}
