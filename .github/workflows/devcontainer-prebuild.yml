name: Devcontainer prebuild

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer-prebuild.yml"
  schedule:
    # Mondays 04:00 UTC - rebuilds against base-image and apt updates.
    # Toolchain versions are pinned in the Dockerfile and bumped via PR.
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push
    if: github.repository == 'kurrent-io/gaffer'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prebuild devcontainer
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          imageName: ghcr.io/kurrent-io/gaffer-devcontainer
          imageTag: latest,${{ github.sha }}
          platform: linux/amd64,linux/arm64
          push: always
          cacheFrom: ghcr.io/kurrent-io/gaffer-devcontainer:latest
